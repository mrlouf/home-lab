
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskmaster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://gitea.localhost/nicolas/taskmaster
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: taskmaster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true